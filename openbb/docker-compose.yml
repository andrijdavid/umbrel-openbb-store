version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: openbb_web_1
      APP_PORT: 80

  # front door: config page at /, config API at /_config, everything else -> openbb.
  # also exposes the token-gated external endpoint on 8188 for OpenBB Workspace.
  web:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    restart: on-failure
    depends_on:
      - server
      - config
    ports:
      - "8188:8188"
    environment:
      OPENBB_EXTERNAL_TOKEN: ${APP_OPENBB_EXTERNAL_TOKEN}
    volumes:
      - ${APP_DATA_DIR}/data/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${APP_DATA_DIR}/data/web/index.html:/srv/index.html:ro
      - ${APP_DATA_DIR}/data/config:/flags:ro

  # OpenBB Platform API (FastAPI, 6900). The image entrypoint is a supervisor that
  # installs plugins listed in /data/plugins.json into the persisted user site and
  # reloads the API when that manifest changes. Settings/keys persist under /data/.openbb_platform
  server:
    image: ghcr.io/andrijdavid/openbb-umbrel:4.7.2@sha256:d7da0d2fbb97f5e7603a97c35a674a8f43fcbc2539762339d8c699c697a32e20
    restart: on-failure
    user: "1000:1000"
    environment:
      PLUGINS_MANIFEST: /data/plugins.json
    volumes:
      - ${APP_DATA_DIR}/data/openbb:/data

  # tiny config backend (same image as server, run via command override):
  # edits provider keys in user_settings.json, toggles external access
  config:
    image: ghcr.io/andrijdavid/openbb-umbrel:4.7.2@sha256:d7da0d2fbb97f5e7603a97c35a674a8f43fcbc2539762339d8c699c697a32e20
    restart: on-failure
    user: "1000:1000"
    entrypoint: ["python", "/opt/config-server.py"]
    environment:
      OPENBB_SETTINGS_FILE: /data/.openbb_platform/user_settings.json
      FLAGS_DIR: /flags
      EXTERNAL_TOKEN: ${APP_OPENBB_EXTERNAL_TOKEN}
      EXTERNAL_PORT: "8188"
      CONFIG_PORT: "8000"
      PLUGINS_MANIFEST: /data/plugins.json
    volumes:
      - ${APP_DATA_DIR}/data/openbb:/data
      - ${APP_DATA_DIR}/data/config:/flags
