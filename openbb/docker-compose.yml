version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: openbb_web_1
      APP_PORT: 80

  # front door: config page at /, config API at /_config, everything else -> openbb.
  # also exposes the token-gated external endpoint on 8188 for OpenBB Workspace.
  web:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    restart: on-failure
    depends_on:
      - server
      - config
    ports:
      - "8188:8188"
    environment:
      OPENBB_EXTERNAL_TOKEN: ${APP_OPENBB_EXTERNAL_TOKEN}
    volumes:
      - ${APP_DATA_DIR}/data/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${APP_DATA_DIR}/data/web/index.html:/srv/index.html:ro
      - ${APP_DATA_DIR}/data/config:/flags:ro

  # OpenBB Platform API (FastAPI, 6900). settings + provider keys persist under /data/.openbb_platform
  server:
    image: ghcr.io/andrijdavid/openbb-umbrel:4.7.2@sha256:53687df01d470486f60f0196598b991c05830c533542c9b49b82e4be2f7ec5cb
    restart: on-failure
    user: "1000:1000"
    volumes:
      - ${APP_DATA_DIR}/data/openbb:/data

  # tiny config backend: edits provider keys in user_settings.json, toggles external access
  config:
    image: python:3.11-slim@sha256:b27df5841f3355e9473f9a516d38a6783b6c8dfeacaf2d14a240f443b368ddb6
    restart: on-failure
    user: "1000:1000"
    command: ["python", "/app/server.py"]
    environment:
      OPENBB_SETTINGS_FILE: /data/.openbb_platform/user_settings.json
      FLAGS_DIR: /flags
      EXTERNAL_TOKEN: ${APP_OPENBB_EXTERNAL_TOKEN}
      EXTERNAL_PORT: "8188"
      CONFIG_PORT: "8000"
    volumes:
      - ${APP_DATA_DIR}/data/config-app:/app:ro
      - ${APP_DATA_DIR}/data/openbb:/data
      - ${APP_DATA_DIR}/data/config:/flags
