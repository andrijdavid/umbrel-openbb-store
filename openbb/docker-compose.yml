version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: openbb_web_1
      APP_PORT: 80

  # tiny front door: serves the start page at / and proxies the API (incl. /docs) to openbb-api
  web:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    restart: on-failure
    depends_on:
      - server
    volumes:
      - ${APP_DATA_DIR}/data/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${APP_DATA_DIR}/data/web/index.html:/srv/index.html:ro

  # OpenBB Platform API (FastAPI, port 6900). settings + provider keys persist under /data/.openbb_platform
  server:
    image: ghcr.io/andrijdavid/openbb-umbrel:4.7.2@sha256:53687df01d470486f60f0196598b991c05830c533542c9b49b82e4be2f7ec5cb
    restart: on-failure
    user: "1000:1000"
    volumes:
      - ${APP_DATA_DIR}/data/openbb:/data
